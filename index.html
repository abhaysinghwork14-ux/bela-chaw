<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game Landing Page</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"/>
</head>
<body>

    <div class="container">
        
        <div class="bg-watermark">SQUID</div>

        <header class="navbar">
            <div class="brand-logo">
                <img width="90px" src="/project3/vadim-bogulov-bRFtEw30LYw-unsplash-removebg-preview.png" alt="Squid Game Logo">
            </div>
            
            <nav class="nav-links">
                <a href="#">About</a>
                <a href="#" class="active">Watch now</a>
                <a href="#">Actors</a>
                <a href="#">Contact</a>
            </nav>

            <div class="menu-toggle">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </header>

        <main class="hero-section">
            
            <div class="hero-content">
                <img src="/project3/vadim-bogulov-bRFtEw30LYw-unsplash-removebg-preview.png" alt="Squid Game Title" class="main-title-img">
                
                <p class="description">
                    Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
                    Season 1: 9 Episodes
                </p>

                <div class="button-group">
                    <button class="btn primary-btn">
                        <span class="btn-icon">▶</span> Play Now
                    </button>
                    <button class="btn secondary-btn">
                        <span class="btn-icon">▷</span> Watch Trailer
                    </button>
                </div>
            </div>

            <div class="scroll-indicator">
                <span>SCROLL</span>
                <div class="scroll-line"></div>
            </div>

            <div class="hero-character">
                <img src="/project3/Generated_Image_May_10__2026_-_3_34PM-removebg-preview.png" alt="Squid Game Guard">
            </div>

            <div class="social-sidebar">
                <a href="#"><i class="ri-twitter-line"></i></a>
                <a href="#"><i class="ri-instagram-line"></i></a>
                <a href="#"><i class="ri-facebook-circle-fill"></i></a>
            </div>

        </main>

        <section class="thumbnail-section">
            <div class="thumb-card">
                <img src="/project3/vadim-bogulov-bRFtEw30LYw-unsplash-removebg-preview.png" alt="Episode 1">
                <div class="play-overlay">▶</div>
            </div>
            <div class="thumb-card">
                <img src="/project3/Generated_Image_May_10__2026_-_3_34PM-removebg-preview.png" alt="Episode 2">
                <div class="play-overlay">▶</div>
            </div>
            <div class="thumb-card">
                <img src="/project3/Generated Image May 10, 2026 - 3_36PM.png" alt="Episode 3">
                <div class="play-overlay">▶</div>
            </div>
        </section>

    </div>

</body>
</html>
