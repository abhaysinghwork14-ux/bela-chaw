<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Art Gallery</title>
    <link rel="stylesheet" href="/project1/style3.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-glow"></div>

    <main class="gallery-container">
        <header class="gallery-header">
            <h2>Explore Art Work</h2>
            <a href="#" class="see-all">See All</a>
        </header>

        <div class="card-grid">
            
            <div class="card">
                <div class="card-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1618331835717-801e976710b2?auto=format&fit=crop&q=80&w=500" alt="Monocular">
                </div>
                <div class="card-info">
                    <span class="title">Painting</span>
                    <div class="stats">
                        <span class="likes">54.8k</span>
                        <span class="heart-icon">♡</span>
                    </div>
                </div>
                <button class="bid-btn">Place Bid</button>
            </div>

            <div class="card">
                <div class="card-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1635805737707-575885ab0820?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8c3BpZGVybWFufGVufDB8fDB8fHwwz" alt="Horns Mask">
                </div>
                <div class="card-info">
                    <span class="title">Spider Man</span>
                    <div class="stats">
                        <span class="likes">32.4k</span>
                        <span class="heart-icon">♡</span>
                    </div>
                </div>
                <button class="bid-btn">Place Bid</button>
            </div>

            <div class="card">
                <div class="card-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1535295972055-1c762f4483e5?auto=format&fit=crop&q=80&w=500" alt="Light Moon">
                </div>
                <div class="card-info">
                    <span class="title">Light Moon</span>
                    <div class="stats">
                        <span class="likes">86.6k</span>
                        <span class="heart-icon">♡</span>
                    </div>
                </div>
                <button class="bid-btn">Place Bid</button>
            </div>

            <div class="card">
                <div class="card-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1608889175157-718b6205a50d?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8YXZlbmdlcnxlbnwwfHwwfHx8MA%3D%3D" alt="Skull Wire">
                </div>
                <div class="card-info">
                    <span class="title">Deadpool</span>
                    <div class="stats">
                        <span class="likes">78.9k</span>
                        <span class="heart-icon">♡</span>
                    </div>
                </div>
                <button class="bid-btn">Place Bid</button>
            </div>

            <div class="card">
                <div class="card-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1640499900704-b00dd6a1103a?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8YXZlbmdlcnxlbnwwfHwwfHx8MA%3D%3D" alt="Spiderman">
                </div>
                <div class="card-info">
                    <span class="title">Doctor</span>
                    <div class="stats">
                        <span class="likes">24.8k</span>
                        <span class="heart-icon">♡</span>
                    </div>
                </div>
                <button class="bid-btn active">Place Bid</button>
            </div>

            <div class="card">
                <div class="card-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1561149877-84d268ba65b8?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8YXZlbmdlcnxlbnwwfHwwfHx8MA%3D%3D" alt="DeadPool">
                </div>
                <div class="card-info">
                    <span class="title">Captain</span>
                    <div class="stats">
                        <span class="likes">59.7k</span>
                        <span class="heart-icon">♡</span>
                    </div>
                </div>
                <button class="bid-btn">Place Bid</button>
            </div>

            <div class="card">
                <div class="card-image-wrapper">
                    <img src="https://plus.unsplash.com/premium_photo-1725356401065-b12922e64ee4?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8c2t1bGwlMjB3aXJlfGVufDB8fDB8fHww" alt="White Eye">
                </div>
                <div class="card-info">
                    <span class="title">skull wire</span>
                    <div class="stats">
                        <span class="likes">45.7k</span>
                        <span class="heart-icon">♡</span>
                    </div>
                </div>
                <button class="bid-btn">Place Bid</button>
            </div>

            <div class="card">
                <div class="card-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1571343220646-cc0bb13cc287?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fGhvcm4lMjBtYXNrfGVufDB8fDB8fHww" alt="Plastic Spinal">
                </div>
                <div class="card-info">
                    <span class="title">White Eye</span>
                    <div class="stats">
                        <span class="likes">98.6k</span>
                        <span class="heart-icon">♡</span>
                    </div>
                </div>
                <button class="bid-btn">Place Bid</button>
            </div>

        </div>
    </main>

</body>
</html>
